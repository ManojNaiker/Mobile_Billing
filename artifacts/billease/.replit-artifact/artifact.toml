kind = "web"
previewPath = "/"
title = "BillEase — GST Invoice Generator"
version = "1.0.0"
id = "artifacts/billease"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21071

[services.development]
run = "pnpm --filter @workspace/billease run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/billease", "run", "build" ]
publicDir = "artifacts/billease/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21071"
BASE_PATH = "/"
